# Configuration for GitHub's auto-generated release notes (gh release create --generate-notes,
# or the "Generate release notes" button in the GitHub UI). The first release (v1.4.0) uses
# CHANGELOG.md directly; this config kicks in for subsequent releases that aggregate PRs.
changelog:
  exclude:
    labels:
      - ignore-for-release
      - dependencies
    authors:
      - dependabot
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Build & CI
      labels:
        - build
        - ci
    - title: Other Changes
      labels:
        - "*"
