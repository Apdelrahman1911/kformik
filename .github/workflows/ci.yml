name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  jvm-android:
    name: JVM + Android + KSP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Tests + assemble
        run: |
          ./gradlew \
            :kformik:jvmTest :kformik:testDebugUnitTest :kformik:testReleaseUnitTest \
            :kformik-compose:jvmTest :kformik-compose:testReleaseUnitTest :kformik-compose:assembleRelease \
            :kformik-forms:jvmTest :kformik-forms:testReleaseUnitTest :kformik-forms:assembleRelease \
            :kformik-ksp:test \
            :sample-forms-cmp-app:assembleDebug :sample-forms-cmp-app:compileKotlinDesktop \
            :examples:compileKotlin \
            --warning-mode=all

      - name: Binary-compatibility check (public ABI)
        # Fails if the committed api/*.api baselines drift; run `./gradlew apiDump` to update.
        run: ./gradlew apiCheck --warning-mode=all

      - name: publishToMavenLocal (unsigned)
        # The signing block is inert without SIGNING_KEY / SIGNING_PASSWORD, so this
        # verifies the publication wiring without needing any secret in CI.
        run: ./gradlew publishToMavenLocal --warning-mode=all

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-ubuntu
          path: '**/build/reports/tests/'
          retention-days: 7

  ios:
    name: iOS Simulator (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: iOS Simulator tests + compile checks for all three iOS targets
        # `iosSimulatorArm64Test` is the only target we actually *test* on (the simulator runs on
        # the macos-14 runner's arm64). For `iosArm64` (real device) and `iosX64` (older Intel
        # simulator) we compile-only — catches commonMain regressions that only manifest under
        # one of those platforms without paying the runtime cost. :kformik-compose and
        # :kformik-forms were previously iOS-checked only at release tag time; gating PRs on
        # iOS compile of the Compose adapter — the most-likely-to-break iOS surface — catches
        # regressions weeks earlier.
        run: |
          ./gradlew \
            :kformik:iosSimulatorArm64Test \
            :kformik:compileKotlinIosArm64 :kformik:compileKotlinIosX64 \
            :kformik-compose:compileKotlinIosSimulatorArm64 \
            :kformik-compose:compileKotlinIosArm64 :kformik-compose:compileKotlinIosX64 \
            :kformik-forms:compileKotlinIosSimulatorArm64 \
            :kformik-forms:compileKotlinIosArm64 :kformik-forms:compileKotlinIosX64 \
            :sample-forms-cmp-app:compileKotlinIosSimulatorArm64 \
            :sample-forms-cmp-app:compileKotlinIosArm64 :sample-forms-cmp-app:compileKotlinIosX64 \
            --warning-mode=all

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-macos
          path: '**/build/reports/tests/'
          retention-days: 7
