org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8

# Single source of truth for group + version. Bumped here at release time; every module reads
# them via the root build.gradle.kts (`group = providers.gradleProperty(...)`). See
# docs/RELEASE_PROCESS.md for the version-bump process.
kformikGroup=io.github.apdelrahman1911
kformikVersion=1.9.1

# Android
android.useAndroidX=true

# Kotlin Multiplatform
kotlin.code.style=official
kotlin.mpp.enableCInteropCommonization=true
kotlin.mpp.androidSourceSetLayoutVersion=2

# Suppress informational compatibility nags (AGP newer than tested-by-KGP, Xcode newer than tested).
# We've verified these combinations work in this repo; suppressing keeps the build log signal-to-noise high.
kotlin.mpp.androidGradlePluginCompatibility.nowarn=true
kotlin.apple.xcodeCompatibility.nowarn=true

# Stable config cache off (KMP + AGP combo is sometimes flaky with config cache)
org.gradle.configuration-cache=false
